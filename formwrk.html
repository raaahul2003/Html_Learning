<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h1, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div style="text-align: center;">
    
    <form action="" >
        <h1><u>Register Form </u></h1>
        
        
        <i class="fa-regular fa-user" style="color: rgb(22, 23, 23);"></i>
        <label for="">Username: </label>
        <input type="text" placeholder="Username Please">
        <br><br>

        <i class="fa-regular fa-calendar" style="color: rgb(22, 23, 23);"></i>
        <label for="">Age</label>
        <input type="text" placeholder="Age Please">
        <br><br>

        <i class="fa-solid fa-address-book" style="color: rgb(22, 23, 23);"></i>
        <label for="">Address: </label>
        <textarea name="" id="" placeholder="Type your address here.."></textarea>
        <br><br>

        <label for="">Date of Birth:</label>
        <input type="date" name="" id="">
        <br><br>

        <label for="">Email: </label>
        <input type="email" placeholder="xyz@gmail.com">
        <br><br>

        <label for="">Gender: </label>
        <input type="radio" name="gender" id="">
        <label for="">Male</label>

        <input type="radio" name="gender" id="">
        <label for="">Female</label>

        <input type="radio" name="gender" id="">
        <label for="">Others</label>
        <br><br>

        <label for="">Select Hobbies: </label>
        <input type="checkbox" name="" id="">
        <label for="">Gaming</label>

        <input type="checkbox" name="" id="">
        <label for="">Reading</label>

        <input type="checkbox" name="" id="">
        <label for="">Cooking</label>
        <br><br>

        <label for="">Choose place: </label>
        <select name="" id=""    >
            <option value="Calicut">Choose a Place</option>
            <option value="Calicut">Calicut</option>
            <option value="kannur">Kannur</option>
        </select>
        <br><br>

        <label for="">Upload CV: </label>
        <input type="file" name="" id="">
        <br><br>

        <button>Submit</button>
        <input type="button" value="Cancel">
        


    </form>
    </div>
</body>
</html>
